<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study AI — Профиль</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; background: #e0ddd8; min-height: 100vh; }

.page { max-width: 1200px; margin: 0 auto; padding: 28px 36px 60px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-text { font-size: 22px; font-weight: 500; color: #111; }
.btn-back { background: #111; color: #f5ece4; border: none; border-radius: 50px; padding: 12px 24px; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; }
.btn-back:hover { background: #333; }

.user-row { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
.avatar { width: 72px; height: 72px; border-radius: 50%; background: rgba(0,0,0,.1); display: flex; align-items: center; justify-content: center; }
.username { font-size: 40px; font-weight: 600; color: #111; letter-spacing: -.5px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; align-items: stretch; }
.stat-card { background: rgba(255,255,255,.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 24px 28px; border: 1px solid rgba(255,255,255,.7); min-height: 160px; }

.streak-card { display: flex; align-items: flex-start; gap: 32px; }
.streak-num { font-size: 64px; font-weight: 700; color: #111; line-height: 1; }
.streak-info { flex: 1; padding-top: 4px; }
.streak-label { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 2px; }
.streak-record { font-size: 13px; color: rgba(26,26,26,.45); margin-bottom: 12px; }
.streak-hint { font-size: 12px; color: rgba(26,26,26,.4); margin-top: 6px; }

/* Week dots — отдельные стили, не наследуют от cal-day-label */
.week-dots { display: flex; gap: 8px; margin-bottom: 4px; }
.week-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.week-dow { font-size: 11px; color: rgba(26,26,26,.4); text-align: center; line-height: 1; }
.day-dot { width: 28px; height: 28px; border-radius: 8px; background: rgba(0,0,0,.1); }
.day-dot.done { background: #F5A623; }
.day-dot.today { background: #111; }

/* Timer — фиксированная ширина цифр чтобы не дёргалось */
.timer-wrap { text-align: right; min-width: 148px; flex-shrink: 0; }
.timer-label { font-size: 13px; color: rgba(26,26,26,.4); margin-bottom: 8px; }
.timer { font-size: 38px; font-weight: 300; color: #111; letter-spacing: -1px; font-variant-numeric: tabular-nums; white-space: nowrap; }
.timer sup { font-size: 12px; font-weight: 400; color: rgba(26,26,26,.45); vertical-align: super; margin-left: 1px; margin-right: 2px; }

.metrics-card { display: flex; align-items: center; justify-content: space-around; height: 100%; }
.metric { text-align: center; }
.metric-num { font-size: 48px; font-weight: 700; color: #111; line-height: 1; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
.metric-label { font-size: 13px; color: rgba(26,26,26,.45); line-height: 1.3; }

.section-title { font-size: 14px; font-weight: 600; color: rgba(26,26,26,.45); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px; }

/* Calendar */
.calendar-wrap { background: rgba(255,255,255,.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 24px 28px; border: 1px solid rgba(255,255,255,.7); margin-bottom: 32px; }
.calendar { display: flex; gap: 0; width: 100%; }

/* Левая колонка с подписями дней — высота строк ДОЛЖНА совпадать с ячейками */
.cal-months { display: flex; gap: 8px; width: 100%; justify-content: space-between; }
.cal-month { display: flex; flex-direction: column; }
.cal-month-name { font-size: 11px; color: rgba(26,26,26,.45); font-weight: 500; margin-bottom: 5px; white-space: nowrap; }
.cal-month-grid { display: flex; gap: 3px; }
.cal-week { display: flex; flex-direction: column; gap: 3px; }
.cal-cell { width: 14px; height: 14px; border-radius: 3px; background: rgba(0,0,0,.1); flex-shrink: 0; }
.cal-cell.active { background: #F5A623; }
.cal-cell.today { background: #111; }
.cal-cell.empty { background: transparent; }

/* Achievements — локированный бейдж поверх фильтра */
.achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.ach-card { background: rgba(255,255,255,.6); backdrop-filter: blur(12px); border-radius: 16px; padding: 16px; border: 1px solid rgba(255,255,255,.7); display: flex; flex-direction: column; align-items: flex-start; gap: 10px; transition: transform .15s; position: relative; }
.ach-card:hover { transform: translateY(-2px); }

/* Заблокированные: серость только на иконке и тексте, НЕ на бейдже */
.ach-card.locked .ach-icon,
.ach-card.locked .ach-name,
.ach-card.locked .ach-desc { opacity: .4; filter: grayscale(1); }

.ach-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.ach-icon.orange { background: rgba(245,166,35,.2); }
.ach-icon.black  { background: rgba(26,26,26,.1); }
.ach-icon.green  { background: rgba(39,174,96,.15); }
.ach-icon.blue   { background: rgba(41,128,185,.12); }
.ach-name { font-size: 13px; font-weight: 600; color: #111; line-height: 1.3; }
.ach-desc { font-size: 12px; color: rgba(26,26,26,.45); line-height: 1.4; }
.ach-badge { font-size: 10px; font-weight: 600; border-radius: 6px; padding: 3px 8px; margin-top: auto; }
.ach-badge.unlocked { color: #7a4200; background: rgba(245,166,35,.3); }
.ach-badge.locked-badge { color: #fff; background: rgba(26,26,26,.55); }
</style>
</head>

<script>
const ACHIEVEMENTS = [
  { id:'first_chat', icon:'🐣', color:'orange', name:'Первый шаг', desc:'Открыл первый чат', req: s => s.chats >= 1 },
  { id:'streak3', icon:'🔥', color:'orange', name:'3 дня подряд', desc:'Занимался 3 дня без перерыва', req: s => s.maxStreak >= 3 },
  { id:'streak7', icon:'⚡', color:'orange', name:'Неделя', desc:'7 дней без перерыва', req: s => s.maxStreak >= 7 },
  { id:'streak30', icon:'💎', color:'black', name:'Месяц', desc:'30 дней без перерыва', req: s => s.maxStreak >= 30 },
  { id:'days10', icon:'📅', color:'green', name:'10 дней занятий', desc:'Провёл 10 учебных дней', req: s => s.studyDays >= 10 },
  { id:'days50', icon:'🏆', color:'black', name:'50 дней', desc:'Провёл 50 учебных дней', req: s => s.studyDays >= 50 },
  { id:'chats5', icon:'💬', color:'blue', name:'Болтун', desc:'Создал 5 чатов', req: s => s.chats >= 5 },
  { id:'chats20', icon:'🦜', color:'blue', name:'Неугомонный', desc:'Создал 20 чатов', req: s => s.chats >= 20 },
  { id:'cards_done', icon:'🃏', color:'orange', name:'Картограф', desc:'Изучил первый набор карточек', req: s => s.cardsDone >= 1 },
  { id:'roadmap_done', icon:'🗺️', color:'green', name:'Следопыт', desc:'Открыл роадмап', req: s => s.roadmaps >= 1 },
  { id:'hour1', icon:'⏱️', color:'blue', name:'Час в деле', desc:'Провёл 1 час за учёбой', req: s => s.totalMinutes >= 60 },
  { id:'hour10', icon:'🕐', color:'black', name:'10 часов', desc:'Суммарно 10 часов занятий', req: s => s.totalMinutes >= 600 },
];

function loadStats() {
  try { return JSON.parse(localStorage.getItem('studyai_stats') || '{}'); } catch { return {}; }
}
function saveStats(s) { localStorage.setItem('studyai_stats', JSON.stringify(s)); }

function initStats() {
  const s = loadStats();
  if (!s.createdAt) {
    s.createdAt = Date.now();
    s.chats = 0;
    s.studyDays = 0;
    s.maxStreak = 0;
    s.currentStreak = 0;
    s.lastStudyDate = null;
    s.activityMap = {};
    s.cardsDone = 0;
    s.roadmaps = 0;
    s.totalMinutes = 0;
    s.sessionStart = Date.now();
    saveStats(s);
  }
  if (!s.sessionStart) { s.sessionStart = Date.now(); saveStats(s); }
  return s;
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function updateStreak(s) {
  const today = todayKey();
  if (s.lastStudyDate === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  if (s.lastStudyDate === yKey) { s.currentStreak = (s.currentStreak||0) + 1; }
  else { s.currentStreak = 1; }
  s.maxStreak = Math.max(s.maxStreak||0, s.currentStreak);
  s.lastStudyDate = today;
  s.activityMap = s.activityMap || {};
  s.activityMap[today] = (s.activityMap[today]||0) + 1;
  s.studyDays = Object.keys(s.activityMap).length;
  saveStats(s);
}

function renderWeekDots(s) {
  const days = ['пн','вт','ср','чт','пт','сб','вс'];
  const today = new Date();
  const todayDow = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const container = document.getElementById('week-dots');
  container.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - todayDow + i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = i === todayDow;
    const isDone = s.activityMap && s.activityMap[key];
    const col = document.createElement('div');
    col.className = 'week-col';
    col.innerHTML = `<div class="week-dow">${days[i]}</div><div class="day-dot ${isToday?'today':(isDone?'done':'')}"></div>`;
    container.appendChild(col);
  }
}

function renderCalendar(s) {
  const act = s.activityMap || {};
  const today = new Date();
  const todayKey2 = todayKey();
  const months = [];
  const start = new Date(today);
  start.setMonth(start.getMonth() - 7);
  start.setDate(1);
  let cur = new Date(start);
  while (cur <= today) {
    const mName = cur.toLocaleDateString('ru', {month:'long'});
    const mKey = `${cur.getFullYear()}-${cur.getMonth()}`;
    months.push({ name: mName, key: mKey, year: cur.getFullYear(), month: cur.getMonth() });
    cur.setMonth(cur.getMonth()+1);
  }
  const container = document.getElementById('cal-months');
  container.innerHTML = '';
  const RU_MONTHS = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
  for (const m of months) {
    const mDiv = document.createElement('div');
    mDiv.className = 'cal-month';
    mDiv.innerHTML = `<div class="cal-month-name">${RU_MONTHS[m.month]}</div>`;
    const grid = document.createElement('div');
    grid.className = 'cal-month-grid';
    const firstDay = new Date(m.year, m.month, 1);
    const lastDay = new Date(m.year, m.month+1, 0);
    const startDow = firstDay.getDay() === 0 ? 6 : firstDay.getDay()-1;
    const totalDays = lastDay.getDate();
    const weeks = Math.ceil((startDow + totalDays) / 7);
    for (let w = 0; w < weeks; w++) {
      const wDiv = document.createElement('div'); wDiv.className = 'cal-week';
      for (let d = 0; d < 7; d++) {
        const dayNum = w*7 + d - startDow + 1;
        const cell = document.createElement('div');
        if (dayNum < 1 || dayNum > totalDays) {
          cell.className = 'cal-cell empty';
        } else {
          const dKey = `${m.year}-${String(m.month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
          const future = new Date(m.year, m.month, dayNum) > today;
          cell.className = 'cal-cell' + (future ? ' empty' : (dKey === todayKey2 ? ' today' : (act[dKey] ? ' active' : '')));
          cell.title = dKey;
        }
        wDiv.appendChild(cell);
      }
      grid.appendChild(wDiv);
    }
    mDiv.appendChild(grid);
    container.appendChild(mDiv);
  }
}

function renderAchievements(s) {
  const stats = {
    chats: s.chats||0, studyDays: s.studyDays||0,
    maxStreak: s.maxStreak||0, cardsDone: s.cardsDone||0,
    roadmaps: s.roadmaps||0, totalMinutes: s.totalMinutes||0
  };
  const container = document.getElementById('achievements');
  container.innerHTML = '';
  for (const a of ACHIEVEMENTS) {
    const unlocked = a.req(stats);
    const card = document.createElement('div');
    card.className = 'ach-card' + (unlocked ? '' : ' locked');
    card.innerHTML = `
      <div class="ach-icon ${a.color}">${a.icon}</div>
      <div>
        <div class="ach-name">${a.name}</div>
        <div class="ach-desc">${a.desc}</div>
      </div>
      <div class="ach-badge ${unlocked ? 'unlocked' : 'locked-badge'}">${unlocked ? 'Получено' : 'Заблокировано'}</div>`;
    container.appendChild(card);
  }
}

function renderTimer() {
  const now = new Date();
  const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  const remaining = Math.max(0, Math.floor((endOfDay - now) / 1000));
  const h = Math.floor(remaining / 3600);
  const m = Math.floor((remaining % 3600) / 60);
  const sec = remaining % 60;
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('timer').innerHTML =
    `${pad(h)}<sup>ч</sup>${pad(m)}<sup>мин</sup>${pad(sec)}<sup>с</sup>`;
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return many;
  if (mod10 === 1) return one;
  if (mod10 >= 2 && mod10 <= 4) return few;
  return many;
}

function render() {
  const s = initStats();
  updateStreak(s);
  const streak = s.currentStreak || 0;
  const maxS = s.maxStreak || 0;
  const days = s.studyDays || 0;
  const chats = s.chats || 0;

  document.getElementById('streak-num').textContent = streak;
  document.getElementById('streak-label').textContent = plural(streak, 'день без перерыва', 'дня без перерыва', 'дней без перерыва');
  document.getElementById('streak-record').textContent = `рекорд — ${maxS} ${plural(maxS, 'день', 'дня', 'дней')}`;
  document.getElementById('streak-hint').textContent = streak > 0 ? 'Продолжите серию!' : 'Начните серию сегодня';

  document.getElementById('days-count').textContent = days;
  document.getElementById('days-label').textContent = plural(days, 'день занятий', 'дня занятий', 'дней занятий');

  document.getElementById('chats-count').textContent = chats;
  document.getElementById('chats-label').textContent = plural(chats, 'чат', 'чата', 'чатов');

  document.getElementById('max-streak').textContent = maxS;
  document.getElementById('max-streak-label').textContent = `${plural(maxS, 'день', 'дня', 'дней')} без перерыва максимально`;

  const user = localStorage.getItem('studyai_username') || 'Пользователь';
  document.getElementById('username-display').textContent = user;
  renderWeekDots(s);
  renderCalendar(s);
  renderAchievements(s);
}

render();
renderTimer();
setInterval(() => { renderTimer(); }, 1000);

window.incrementStat = function(key, amount=1) {
  const s = loadStats();
  s[key] = (s[key]||0) + amount;
  saveStats(s);
  render();
};
</script>
</body>
