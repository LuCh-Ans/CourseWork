<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Pro Display', sans-serif; background: #e0ddd8; overflow: hidden; }

  .screen {
    width: 100%; height: 100vh; min-height: 700px;
    background: #e0ddd8;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 28px 36px 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-text { font-size: 22px; font-weight: 500; color: #111; letter-spacing: -0.3px; }

  .user-block { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .user-row { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .user-name { font-size: 20px; font-weight: 400; color: #111; }

  .btn-projects {
    background: #111;
    color: #f5ece4;
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-projects:hover { background: #333; }

  /* MAIN LAYOUT */
  .main {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 90px;
  }

  /* Headline ABOVE sphere */
  .headline {
    text-align: center;
    margin-top: 80px; 
    margin-bottom: -180px; 
    z-index: 10; 
  }
  .headline p { font-size: 30px; font-weight: 400; color: #111; line-height: 1.35; }
  .headline strong { font-weight: 700; }

  /* Sphere */
  .sphere {
    width: 520px; height: 520px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #ffb347 0%, #FF8D28 38%, #c45a0a 80%, #7a3200 100%);
    box-shadow:
      inset -18px -18px 60px rgba(0,0,0,0.28),
      inset 8px 8px 30px rgba(255,200,100,0.25),
      0 20px 80px rgba(180,80,0,0.2);
    flex-shrink: 0;
    z-index: 2;
  }

  /* Glass zone overlaps bottom of sphere */
  .glass-zone {
    position: relative;
    z-index: 10;
    margin-top: -280px;
    width: 650px;
    height: 320px; 
    background: rgba(210, 190, 165, 0.30);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 36px;
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 8px 40px rgba(0,0,0,0.07);
    padding: 80px 40px 44px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .glass-zone:hover { background: rgba(210,190,165,0.42); }

  .upload-label { font-size: 17px; color: #666; }
  .upload-label strong { color: #111; font-weight: 500; }

  #fileInput { display: none; }

  /* OVERLAY */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 100;
    align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .overlay-card {
    background: #e0ddd8; border-radius: 32px;
    padding: 48px 56px; max-width: 440px; width: 90%;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.2);
  }
  .overlay-card h2 { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
  .overlay-card p  { font-size: 15px; color: #666; margin-bottom: 20px; }
  .filename {
    background: rgba(245,166,35,0.15); border-radius: 12px;
    padding: 10px 16px; font-size: 13px; color: #c06000;
    margin-bottom: 24px; word-break: break-all;
  }
  .btn-black {
    background: #111; color: #f5ece4; border: none;
    border-radius: 50px; padding: 14px 36px;
    font-size: 15px; cursor: pointer; margin: 0 5px;
    transition: background 0.2s;
  }
  .btn-black:hover { background: #333; }
  .btn-ghost {
    background: transparent; color: #666;
    border: 1px solid #ccc; border-radius: 50px;
    padding: 14px 28px; font-size: 14px; cursor: pointer; margin: 0 5px;
  }
  .btn-ghost:hover { background: rgba(0,0,0,0.05); }
</style>
</head>
<body>

      </svg>
      <span class="logo-text">Study AI</span>
    </div>

    <div class="user-block">
      <div class="user-row">
        <div class="user-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
        </div>
        <span class="user-name">Username</span>
      </div>
      <button class="btn-projects" onclick="showProjects()">созданные проекты</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Headline ABOVE sphere -->
    <div class="headline">
      <p>Загрузи материал — получи</p>
      <p><strong>умный конспект</strong></p>
    </div>

    <!-- Sphere -->
    <div class="sphere"></div>

    <!-- Glass zone overlapping sphere bottom -->
    <div class="glass-zone"
         onclick="document.getElementById('fileInput').click()"
         ondragover="event.preventDefault(); this.style.background='rgba(210,190,165,0.45)'"
         ondragleave="this.style.background=''"
         ondrop="handleDrop(event)">
      <p class="upload-label"><strong>перетащи файл</strong> <span> сюда или выбери вручную</span></p>
      <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt,.pptx" onchange="handleFile(this.files[0])"/>
    </div>

  </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <h2>Файл загружен</h2>
    <p>Хочешь создать умный конспект?</p>
    <div class="filename" id="filenameLabel">—</div>
    <div>
      <button class="btn-black" onclick="goToProject()">Создать конспект →</button>
      <button class="btn-ghost" onclick="closeOverlay()">Отмена</button>
    </div>
  </div>
</div>

<script>
function handleFile(file) {
  if (!file) return;
  document.getElementById('filenameLabel').textContent = file.name;
  document.getElementById('overlay').classList.add('show');
}
function handleDrop(e) {
  e.preventDefault();
  document.querySelector('.glass-zone').style.background = '';
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}
function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }
function goToProject() { closeOverlay(); sendPrompt('Файл загружен, открой экран проекта с чатом'); }
function showProjects() { sendPrompt('Покажи созданные проекты'); }
</script>
</body>
</html>
