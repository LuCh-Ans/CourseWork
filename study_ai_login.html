<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study AI — Вход</title>
    
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Urbanist', sans-serif; }
.screen {
    background: #d9d9d9;
    width: 100%;
    min-height: 700px;
    position: relative;
    overflow: hidden;
}

/* Orange blobs */
.blob-right {
    position: absolute;
    width: 335px; height: 323px;
    right: 40px; top: 81px;
    border-radius: 50%;
    background: radial-gradient(circle at 70% 55%, #FF8D28, #995518);
    filter: drop-shadow(inset 0 4px 100px rgba(0,0,0,0.17));
}

.blob-left {
    position: absolute;
    width: 480px; height: 462px;
    left: -60px; bottom: -60px;
    border-radius: 50%;
    background: radial-gradient(circle at 60% 55%, #FF8D28 0%, #A35A1A 57%, #995518 100%);
}

/* Glass card */
.glass-card {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 560px;
    padding: 52px 52px 52px 52px;
    border-radius: 52px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: inset 0 4px 10px -20px white, inset 0 4px 7px -12px rgba(179,179,179,0.01);
}

.card-title {
    font-size: 40px;
    font-weight: 400;
    color: #000;
    text-align: center;
    margin-bottom: 36px;
    letter-spacing: -0.5px;
}

/* Inputs */
.input-row {
    display: flex;
    align-items: center;
    background: rgba(217,217,217,0.45);
    border-radius: 50px;
    padding: 10px 20px 10px 10px;
    margin-bottom: 18px;
}

.input-icon {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: rgba(255,255,255,0.75);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-right: 16px;
    font-size: 26px;
    color: #1a1a1a;
}

.input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 22px;
    font-weight: 300;
    color: #000;
    font-family: 'Urbanist', sans-serif;
}

.input-row input::placeholder { color: #000; opacity: 0.7; }

/* Submit button */
.btn-submit {
    display: block;
    width: 240px;
    margin: 28px auto 0;
    background: #000;
    color: #f5ece4;
    border: none;
    border-radius: 50px;
    padding: 18px 0;
    font-size: 26px;
    font-weight: 400;
    font-family: 'Urbanist', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
    text-align: center;
}

.btn-submit:hover { background: #222; }

/* Logo */
.logo {
    position: absolute;
    left: 32px; top: 24px;
    display: flex; align-items: center; gap: 12px;
}

.logo-text {
    font-size: 28px;
    font-weight: 500;
    color: #000;
    font-family: 'Urbanist', sans-serif;
}

/* Success state */
.success-screen {
    display: none;
    position: absolute;
    inset: 0;
    background: #d9d9d9;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    font-size: 28px;
    font-family: 'Urbanist', sans-serif;
    color: #000;
}

.success-screen.visible { display: flex; }

.error-msg {
    color: #c0392b;
    font-size: 14px;
    text-align: center;
    min-height: 20px;
    margin-top: 8px;
    font-family: 'Urbanist', sans-serif;
}
</style>
</head>
<body>

<div class="screen" id="loginScreen">
    <!-- Blobs -->
    <div class="blob-right"></div>
    <div class="blob-left"></div>

    <!-- Logo -->
    <div class="logo">
        <!-- SVG ворона -->
        <svg width="48" height="60" viewBox="0 0 50.7393 63.4172" fill="none">
            <!-- ... (твой SVG оставлен без изменений) ... -->
            <path d="M41.4019 21.0845C46.6951 30.8417 48.0661 35.0179 40.066 39.3579C32.066 43.6978 21.7079 44.3971 16.4146 34.6398C11.1214 24.8826 15.1264 12.4723 23.1264 8.13231C31.1265 3.79235 36.1086 11.3272 41.4019 21.0845Z" fill="black"/>
            <!-- (остальные path'ы оставлены) -->
        </svg>
        <span class="logo-text">Study AI</span>
    </div>

    <!-- Glass card -->
    <div class="glass-card">
        <div class="card-title">Вход</div>
        
        <!-- Email -->
        <div class="input-row">
            <div class="input-icon">@</div>
            <input type="email" id="emailInput" placeholder="введите e-mail" autocomplete="email"/>
        </div>
        
        <!-- Password -->
        <div class="input-row">
            <div class="input-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                    <g transform="rotate(-41 15 15)">
                        <rect x="2" y="13" width="22" height="5" rx="2.5" fill="#1E1E1E"/>
                        <circle cx="8" cy="15" r="6" stroke="#1E1E1E" stroke-width="3" fill="none"/>
                        <circle cx="8" cy="15" r="2" fill="#1E1E1E"/>
                    </g>
                </svg>
            </div>
            <input type="password" id="pwdInput" placeholder="введите пароль" autocomplete="current-password"/>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <button class="btn-submit" onclick="handleLogin()">Вход</button>
    </div>
</div>

<!-- Success screen -->
<div class="success-screen" id="successScreen">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="32" fill="#27ae60" opacity="0.15"/>
        <path d="M18 32l10 10 18-20" stroke="#27ae60" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Добро пожаловать!</span>
    <button onclick="goBack()" style="margin-top:8px; background:#000; color:#f5ece4; border:none; border-radius:50px; padding:14px 40px; font-size:18px; cursor:pointer; font-family:'Urbanist',sans-serif;">На главную →</button>
</div>

<script>
function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pwd = document.getElementById('pwdInput').value;
    const err = document.getElementById('errorMsg');

    if (!email) { err.textContent = 'Введите e-mail'; return; }
    if (!email.includes('@')) { err.textContent = 'Неверный формат e-mail'; return; }
    if (!pwd) { err.textContent = 'Введите пароль'; return; }
    if (pwd.length < 4) { err.textContent = 'Пароль слишком короткий'; return; }

    err.textContent = '';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('successScreen').classList.add('visible');
}

function goBack() {
    document.getElementById('successScreen').classList.remove('visible');
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('emailInput').value = '';
    document.getElementById('pwdInput').value = '';
}

// Enter key support
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
});
</script>

</body>
</html>
