<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study AI — Вход</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Urbanist', sans-serif; }

.screen {
    background: #d9d9d9;
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}
.blob-right {
position: absolute;
width: 385px; height: 383px;
right: 140px; top: 81px;
border-radius: 50%;
background: radial-gradient(circle at 70% 55%, #FF8D28, #995518);
filter: drop-shadow(inset 0 4px 100px rgba(0,0,0,0.17));
  }
.blob-left {
position: absolute;
width: 580px; height: 562px;
left: -60px; bottom: -60px;
border-radius: 50%;
background: radial-gradient(circle at 60% 55%, #FF8D28 0%, #A35A1A 57%, #995518 100%);
  }
.glass-card {
position: absolute;
left: 50%; top: 50%;
transform: translate(-50%, -50%);
width: 560px;
padding: 52px 52px 52px 52px;
border-radius: 52px;
background: rgba(255,255,255,0.12);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.18);
box-shadow: inset 0 4px 10px -20px white, inset 0 4px 7px -12px rgba(179,179,179,0.01);
  }
.card-title {
font-size: 58px;
font-weight: 400;
color: #000;
text-align: center;
margin-bottom: 36px;
letter-spacing: -0.5px;
  }
.tabs {
display: flex;
background: rgba(217,217,217,0.45);
border-radius: 50px;
padding: 6px;
margin-bottom: 32px;
}
.tab {
flex: 1;
padding: 14px;
text-align: center;
border-radius: 50px;
font-size: 16px;
font-weight: 400;
cursor: pointer;
transition: all 0.3s;
}
.tab.active {
background: #000;
color: #f5ece4;
}

.input-row {
display: flex;
align-items: center;
background: rgba(217,217,217,0.45);
border-radius: 50px;
padding: 10px 20px 10px 10px;
margin-bottom: 18px;
position: relative;
  }
.input-icon {
width: 58px; height: 58px;
border-radius: 50%;
background: rgba(255,255,255,0.75);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
margin-right: 16px;
font-size: 26px;
color: #1a1a1a;
  }
.input-row input {
flex: 1;
background: transparent;
border: none;
outline: none;
font-size: 22px;
font-weight: 300;
color: #000;
font-family: 'Urbanist', sans-serif;
  }
.input-row input::placeholder { color: #000; opacity: 0.7; }

.toggle-password {
position: absolute;
right: 20px;
background: none;
border: none;
cursor: pointer;
color: #555;
display: flex;
align-items: center;
justify-content: center;
padding: 4px;
opacity: 0.65;
transition: opacity 0.2s;
}
.toggle-password:hover { opacity: 1; }
.toggle-password svg { display: block; }

.btn-submit {
display: block;
width: 240px;
margin: 28px auto 0;
background: #000;
color: #f5ece4;
border: none;
border-radius: 50px;
padding: 18px 0;
font-size: 20px;
font-weight: 400;
font-family: 'Urbanist', sans-serif;
cursor: pointer;
transition: background 0.2s, opacity 0.2s;
text-align: center;
  }
.btn-submit:hover { background: #222; }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.logo {
position: absolute;
left: 32px; top: 24px;
display: flex; align-items: center; gap: 12px;
  }
.logo-text {
font-size: 28px;
font-weight: 500;
color: #000;
font-family: 'Urbanist', sans-serif;
  }

.success-screen {
display: none;
position: absolute;
inset: 0;
background: #d9d9d9;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 16px;
font-size: 28px;
font-family: 'Urbanist', sans-serif;
color: #000;
  }
.success-screen.visible { display: flex; }
.error-msg {
color: #c0392b;
font-size: 14px;
text-align: center;
min-height: 20px;
margin-top: 8px;
font-family: 'Urbanist', sans-serif;
  }
</style>
</head>
<body>
<div class="screen" id="loginScreen">
<!-- Blobs -->
<div class="blob-right"></div>
<div class="blob-left"></div>

<!-- Logo -->
<div class="logo">
<svg width="48" height="60" viewBox="0 0 50.7393 63.4172" fill="none">
<path d="M41.4019 21.0845C46.6951 30.8417 48.0661 35.0179 40.066 39.3579C32.066 43.6978 21.7079 44.3971 16.4146 34.6398C11.1214 24.8826 15.1264 12.4723 23.1264 8.13231C31.1265 3.79235 36.1086 11.3272 41.4019 21.0845Z" fill="black"/>
<path d="M11.4802 47.1275C7.50095 54.3471 8.85279 55.9132 6.75723 54.6152C4.66166 53.3171 2.41855 46.9546 6.39779 39.735C10.377 32.5153 19.0717 26.6358 21.1673 27.9338C23.2629 29.2318 15.4594 39.9079 11.4802 47.1275Z" fill="black"/>
<path d="M8.17373 30.0976C3.83736 37.1095 1.56017 36.5646 4.03601 37.9257C6.51184 39.2868 13.8031 38.4702 18.1394 31.4583C22.4758 24.4465 22.7162 13.6491 20.2404 12.288C17.7646 10.9269 12.5101 23.0857 8.17373 30.0976Z" fill="black"/>

<path d="M28.3482 36.823C33.2305 30.1776 35.8718 31.1679 32.986 29.2766C30.1002 27.3853 21.69 26.9291 16.8077 33.5744C11.9254 40.2198 11.8454 51.6196 14.7312 53.5109C17.617 55.4023 23.4659 43.4684 28.3482 36.823Z" fill="black"/>
<path d="M40.6012 40.099C42.8324 36.283 44.8417 37.2566 42.5048 35.6566C40.168 34.0566 35.5225 32.0305 33.2913 35.8466C31.0601 39.6626 33.3074 44.8107 35.6443 46.4107C37.9812 48.0106 38.37 43.9151 40.6012 40.099Z" fill="black"/>
<path d="M33.2063 41.5831C35.7185 37.8415 37.7969 39.5781 34.8245 37.8098C31.8521 36.0414 26.0137 33.6993 23.5015 37.441C20.9894 41.1827 24.5207 45.9261 27.4931 47.6944C30.4656 49.4628 30.6942 45.3248 33.2063 41.5831Z" fill="black"/>
<path d="M39.0765 15.0798C40.9553 10.9706 43.2107 8.67144 47.1381 6.43732C49.3643 5.17095 50.7124 4.74502 47.5665 4.85529C41.6781 5.86263 35.0219 8.8951 32.5081 13.7777C30.3738 17.9233 30.5748 17.6639 34.2883 16.8746C35.8238 16.5482 38.4238 16.5075 39.0765 15.0798Z" fill="black"/>
<circle cx="29.4996" cy="14.323" r="2.31018" fill="#D9D9D9"/>
<circle cx="29.9618" cy="13.861" r="0.924071" fill="black"/>
<path d="M40.8377 7.975C40.8377 9.69469 39.0787 11.0888 35.5062 11.0888C31.9338 11.0888 30.8859 10.4983 30.8859 8.77859C30.8859 7.0589 30.7968 8.89085 34.3692 8.89085C37.9417 8.89085 40.8377 6.25532 40.8377 7.975Z" fill="black"/>
<path d="M29.34 57.2922C28.6626 57.271 28.193 54.9749 28.3545 50.3466C28.5161 45.7183 28.796 44.3679 29.4734 44.3891C30.1507 44.4103 29.6611 44.1059 29.4996 48.7342C29.3381 53.3625 30.0173 57.3134 29.34 57.2922Z" fill="black"/>
<path d="M24.3057 56.8581C24.6284 56.2621 26.6299 54.6802 29.9849 56.9645C33.6368 58.942 34.7341 62.829 32.2459 63.0073C31.9232 63.6032 33.1703 59.8637 29.5183 57.8862C25.8664 55.9086 23.983 57.454 24.3057 56.8581Z" fill="black"/>
<path d="M38.3408 56.8684C40.1982 60.067 38.9534 61.8759 39.4964 61.5235C40.0091 61.1908 41.2133 59.4328 39.578 56.7699L38.3408 56.8684Z" fill="black"/>
<path d="M29.3697 56.5161L29.3365 56.852C29.4857 57.0823 30.5716 57.1572 30.7027 57.4517C32.4407 60.3229 30.9174 62.6451 28.8895 61.8857C28.3098 62.2366 31.3446 59.7534 29.6066 56.8822C29.5287 56.7534 29.4496 56.6315 29.3697 56.5161Z" fill="black"/>
<path d="M32.3136 57.0603C32.5137 56.4128 34.1678 54.4705 37.9042 56.0557C41.872 57.282 43.7072 60.8799 41.3017 61.5406C41.1015 62.1881 41.5944 58.2771 37.6266 57.0507C33.6589 55.8244 32.1134 57.7077 32.3136 57.0603Z" fill="black"/>
<path d="M36.6587 56.3683C35.8007 56.3399 35.1862 54.9603 35.3257 50.7391C35.4651 46.5179 35.8007 45.2894 36.6587 45.3177C37.5168 45.3461 36.6062 45.2106 36.4667 49.4318C36.3273 53.653 37.5168 56.3966 36.6587 56.3683Z" fill="black"/>
</svg>
<span class="logo-text">Study AI</span>
</div>

<!-- Glass Card -->
<div class="glass-card">
    <div class="card-title" id="formTitle">Вход</div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab(0)">Вход</div>
        <div class="tab" id="tabRegister" onclick="switchTab(1)">Регистрация</div>
    </div>

    <!-- FORM LOGIN -->
    <div id="loginForm">
        <!-- Email -->
        <div class="input-row">
            <div class="input-icon">@</div>
            <input type="email" id="emailInput" placeholder="введите e-mail" autocomplete="email"/>
        </div>
        <!-- Password -->
        <div class="input-row">
            <div class="input-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="10" cy="10" r="7" stroke="#1E1E1E" stroke-width="2.4" fill="none"/>
                  <circle cx="10" cy="10" r="2.5" fill="#1E1E1E"/>
                  <path d="M15.5 14.5L23.5 22.5" stroke="#1E1E1E" stroke-width="2.4" stroke-linecap="round"/>
                  <path d="M20 19.5L22.5 17" stroke="#1E1E1E" stroke-width="2.2" stroke-linecap="round"/>
                  <path d="M22 21.5L24.5 19" stroke="#1E1E1E" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
            </div>
            <input type="password" id="pwdInput" placeholder="введите пароль" autocomplete="current-password"/>
            <button type="button" class="toggle-password" id="toggleLogin">
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" class="eye-open">
                  <path d="M2 13C2 13 5.5 6 13 6C20.5 6 24 13 24 13C24 13 20.5 20 13 20C5.5 20 2 13 2 13Z" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                  <circle cx="13" cy="13" r="3.5" stroke="#333" stroke-width="2" fill="none"/>
                  <circle cx="13" cy="13" r="1.5" fill="#333"/>
                </svg>
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" class="eye-closed" style="display:none;">
                  <path d="M3 9C5.5 12.5 8.5 14.5 13 14.5C17.5 14.5 20.5 12.5 23 9" stroke="#333" stroke-width="2" stroke-linecap="round" fill="none"/>
                  <path d="M7 13.5L5 17" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                  <path d="M13 15V18.5" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                  <path d="M19 13.5L21 17" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- FORM REGISTER -->
    <div id="registerForm" style="display:none;">
        <!-- Email -->
        <div class="input-row">
            <div class="input-icon">@</div>
            <input type="email" id="regEmailInput" placeholder="введите e-mail" autocomplete="email"/>
        </div>
        <!-- Username -->
        <div class="input-row">
            <div class="input-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1E1E1E" stroke-width="2" stroke-linecap="round">
                  <circle cx="12" cy="8" r="4"/>
                  <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
                </svg>
            </div>
            <input type="text" id="regUsernameInput" placeholder="придумайте username" autocomplete="username"/>
        </div>
        <!-- Password -->
        <div class="input-row">
            <div class="input-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="10" cy="10" r="7" stroke="#1E1E1E" stroke-width="2.4" fill="none"/>
                  <circle cx="10" cy="10" r="2.5" fill="#1E1E1E"/>
                  <path d="M15.5 14.5L23.5 22.5" stroke="#1E1E1E" stroke-width="2.4" stroke-linecap="round"/>
                  <path d="M20 19.5L22.5 17" stroke="#1E1E1E" stroke-width="2.2" stroke-linecap="round"/>
                  <path d="M22 21.5L24.5 19" stroke="#1E1E1E" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
            </div>
            <input type="password" id="regPwdInput" placeholder="придумайте пароль" autocomplete="new-password"/>
            <button type="button" class="toggle-password" id="toggleRegister">
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" class="eye-open">
                  <path d="M2 13C2 13 5.5 6 13 6C20.5 6 24 13 24 13C24 13 20.5 20 13 20C5.5 20 2 13 2 13Z" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                  <circle cx="13" cy="13" r="3.5" stroke="#333" stroke-width="2" fill="none"/>
                  <circle cx="13" cy="13" r="1.5" fill="#333"/>
                </svg>
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" class="eye-closed" style="display:none;">
                  <path d="M3 9C5.5 12.5 8.5 14.5 13 14.5C17.5 14.5 20.5 12.5 23 9" stroke="#333" stroke-width="2" stroke-linecap="round" fill="none"/>
                  <path d="M7 13.5L5 17" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                  <path d="M13 15V18.5" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                  <path d="M19 13.5L21 17" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <!-- Confirm Password -->
        <div class="input-row">
            <div class="input-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="10" cy="10" r="7" stroke="#1E1E1E" stroke-width="2.4" fill="none"/>
                  <circle cx="10" cy="10" r="2.5" fill="#1E1E1E"/>
                  <path d="M15.5 14.5L23.5 22.5" stroke="#1E1E1E" stroke-width="2.4" stroke-linecap="round"/>
                  <path d="M20 19.5L22.5 17" stroke="#1E1E1E" stroke-width="2.2" stroke-linecap="round"/>
                  <path d="M22 21.5L24.5 19" stroke="#1E1E1E" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
            </div>
            <input type="password" id="regConfirmPwdInput" placeholder="повторите пароль" autocomplete="new-password"/>
            <button type="button" class="toggle-password" id="toggleConfirm">
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" class="eye-open">
                  <path d="M2 13C2 13 5.5 6 13 6C20.5 6 24 13 24 13C24 13 20.5 20 13 20C5.5 20 2 13 2 13Z" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                  <circle cx="13" cy="13" r="3.5" stroke="#333" stroke-width="2" fill="none"/>
                  <circle cx="13" cy="13" r="1.5" fill="#333"/>
                </svg>
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none" class="eye-closed" style="display:none;">
                  <path d="M3 9C5.5 12.5 8.5 14.5 13 14.5C17.5 14.5 20.5 12.5 23 9" stroke="#333" stroke-width="2" stroke-linecap="round" fill="none"/>
                  <path d="M7 13.5L5 17" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                  <path d="M13 15V18.5" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                  <path d="M19 13.5L21 17" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Вход</button>
</div>
</div>

<!-- Success screen -->
<div class="success-screen" id="successScreen">
<svg width="64" height="64" viewBox="0 0 64 64" fill="none">
<circle cx="32" cy="32" r="32" fill="#27ae60" opacity="0.15"/>
<path d="M18 32l10 10 18-20" stroke="#27ae60" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<span id="successText">Добро пожаловать!</span>
</div>

<script>
const API = 'http://127.0.0.1:8000';
let currentTab = 0;

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabLogin').classList.toggle('active', tab === 0);
    document.getElementById('tabRegister').classList.toggle('active', tab === 1);
    document.getElementById('loginForm').style.display = tab === 0 ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 1 ? 'block' : 'none';
    document.getElementById('formTitle').textContent = tab === 0 ? 'Вход' : 'Регистрация';
    document.getElementById('submitBtn').textContent = tab === 0 ? 'Вход' : 'Зарегистрироваться';
    document.getElementById('errorMsg').textContent = '';
}

function setupPasswordToggle(inputId, toggleId) {
    const input = document.getElementById(inputId);
    const toggle = document.getElementById(toggleId);
    const eyeOpen = toggle.querySelector('.eye-open');
    const eyeClosed = toggle.querySelector('.eye-closed');
    toggle.addEventListener('click', () => {
        if (input.type === 'password') {
            input.type = 'text';
            eyeOpen.style.display = 'none';
            eyeClosed.style.display = 'block';
        } else {
            input.type = 'password';
            eyeOpen.style.display = 'block';
            eyeClosed.style.display = 'none';
        }
    });
}

setupPasswordToggle('pwdInput', 'toggleLogin');
setupPasswordToggle('regPwdInput', 'toggleRegister');
setupPasswordToggle('regConfirmPwdInput', 'toggleConfirm');

function setLoading(loading) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = loading;
    btn.textContent = loading
        ? 'Загрузка...'
        : (currentTab === 0 ? 'Вход' : 'Зарегистрироваться');
}

async function handleSubmit() {
    const err = document.getElementById('errorMsg');
    err.textContent = '';

    if (currentTab === 0) {
        // LOGIN
        const email = document.getElementById('emailInput').value.trim();
        const pwd = document.getElementById('pwdInput').value;
        if (!email) { err.textContent = 'Введите e-mail'; return; }
        if (!email.includes('@')) { err.textContent = 'Неверный формат e-mail'; return; }
        if (!pwd) { err.textContent = 'Введите пароль'; return; }

        setLoading(true);
        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password: pwd })
            });
            const data = await res.json();
            if (!res.ok) {
                err.textContent = data.detail || 'Неверный e-mail или пароль';
            } else {
                // cookie session_id установлен автоматически браузером
                showSuccess('Добро пожаловать, ' + (data.username || data.email) + '!');
                setTimeout(() => { window.location.href = '/'; }, 900);
            }
        } catch (e) {
            err.textContent = 'Ошибка соединения с сервером';
        } finally {
            setLoading(false);
        }

    } else {
        // REGISTER
        const email = document.getElementById('regEmailInput').value.trim();
        const username = document.getElementById('regUsernameInput').value.trim();
        const pwd = document.getElementById('regPwdInput').value;
        const confirmPwd = document.getElementById('regConfirmPwdInput').value;

        if (!email) { err.textContent = 'Введите e-mail'; return; }
        if (!email.includes('@')) { err.textContent = 'Неверный формат e-mail'; return; }
        if (!username) { err.textContent = 'Введите username'; return; }
        if (username.length < 3) { err.textContent = 'Username должен быть не менее 3 символов'; return; }
        if (!pwd) { err.textContent = 'Придумайте пароль'; return; }
        if (pwd.length < 6) { err.textContent = 'Пароль должен быть не менее 6 символов'; return; }
        if (pwd !== confirmPwd) { err.textContent = 'Пароли не совпадают'; return; }

        setLoading(true);
        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, username, password: pwd })
            });
            const data = await res.json();
            if (!res.ok) {
                err.textContent = data.detail || 'Ошибка регистрации';
            } else {
                // После регистрации — автологин
                const loginRes = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password: pwd })
                });
                if (loginRes.ok) {
                    showSuccess('Регистрация прошла успешно!');
                    setTimeout(() => { window.location.href = '/'; }, 900);
                } else {
                    showSuccess('Аккаунт создан! Войдите.');
                    setTimeout(() => switchTab(0), 1500);
                }
            }
        } catch (e) {
            err.textContent = 'Ошибка соединения с сервером';
        } finally {
            setLoading(false);
        }
    }
}

function showSuccess(text) {
    document.getElementById('successText').textContent = text;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('successScreen').classList.add('visible');
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSubmit();
});
</script>
</body>
</html>
