<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study AI</title>
</head>
<body>
    
  <div style="font-family: var(--font-sans); min-height: 600px; background: linear-gradient(145deg, #e8e6e1 0%, #d9d5ce 100%); border-radius: var(--border-radius-lg); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
    <!-- Orange blobs -->
    <div style="position: absolute; width: 350px; height: 350px; background: linear-gradient(135deg, #F5A623 0%, #E8882D 100%); border-radius: 50%; bottom: -100px; left: -100px; opacity: 0.9;"></div>
    <div style="position: absolute; width: 250px; height: 250px; background: linear-gradient(135deg, #F5A623 0%, #E8882D 100%); border-radius: 50%; top: -60px; right: -60px; opacity: 0.85;"></div>
    <div style="position: absolute; width: 150px; height: 150px; background: linear-gradient(135deg, #F5A623 0%, #E8882D 100%); border-radius: 50%; top: 50%; right: 20%; opacity: 0.6;"></div>

    <!-- Logo top left -->
    <div style="position: absolute; top: 24px; left: 24px; display: flex; align-items: center; gap: 10px; z-index: 10;">
      <svg width="32" height="32" viewBox="0 0 48 48">
        <ellipse cx="28" cy="26" rx="12" ry="16" fill="#1a1a1a"/>
        <ellipse cx="20" cy="30" rx="8" ry="10" fill="#1a1a1a"/>
        <circle cx="32" cy="20" r="3" fill="#1a1a1a"/>
        <circle cx="33" cy="19" r="1.2" fill="#e8e6e1"/>
        <path d="M36 22l8-2-6 4z" fill="#1a1a1a"/>
      </svg>
      <span style="font-size: 18px; font-weight: 500; color: var(--color-text-primary);">Study AI</span>
    </div>

    <!-- Login card -->
    <div style="background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(16px); border-radius: 32px; padding: 48px 40px; width: 340px; border: 1px solid rgba(255,255,255,0.6); z-index: 10;">
      <h1 style="font-size: 28px; font-weight: 500; text-align: center; margin: 0 0 32px; color: var(--color-text-primary);">Log in</h1>
      
      <!-- Email input -->
      <div style="background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px); border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.7);">
        <div style="width: 32px; height: 32px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--color-text-secondary);">@</div>
        <input type="email" placeholder="введите e-mail" style="flex: 1; border: none; background: transparent; font-size: 14px; color: var(--color-text-primary); outline: none;" />
      </div>

      <!-- Password input -->
      <div style="background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px); border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.7);">
        <div style="width: 32px; height: 32px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/></svg>
        </div>
        <input type="password" placeholder="введите пароль" style="flex: 1; border: none; background: transparent; font-size: 14px; color: var(--color-text-primary); outline: none;" />
      </div>

      <!-- Login button -->
      <button onclick="sendPrompt('Покажи главную страницу после входа')" style="width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 24px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer;">Вход</button>
    </div>
  </div>
</body>
</html>
