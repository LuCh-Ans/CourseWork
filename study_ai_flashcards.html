<div id="flashcard-app" style="font-family: var(--font-sans); min-height: 700px; background: linear-gradient(145deg, #e8e6e1 0%, #d9d5ce 100%); border-radius: var(--border-radius-lg); position: relative; overflow: hidden; display: flex;">

  <!-- Sidebar -->
  <div style="width: 220px; padding: 20px 16px; display: flex; flex-direction: column; gap: 8px; z-index: 10;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
      <svg width="32" height="32" viewBox="0 0 48 48">
        <ellipse cx="28" cy="26" rx="12" ry="16" fill="#1a1a1a"/>
        <ellipse cx="20" cy="30" rx="8" ry="10" fill="#1a1a1a"/>
        <circle cx="32" cy="20" r="3" fill="#1a1a1a"/>
        <circle cx="33" cy="19" r="1.2" fill="#e8e6e1"/>
        <path d="M36 22l8-2-6 4z" fill="#1a1a1a"/>
      </svg>
      <span style="font-size: 18px; font-weight: 500; color: var(--color-text-primary);">Study AI</span>
    </div>
    
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
      <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
      </div>
      <span style="font-size: 14px; color: var(--color-text-primary);">Username</span>
    </div>

    <button style="background: #1a1a1a; color: #fff; border: none; border-radius: 20px; padding: 10px 16px; font-size: 14px; cursor: pointer; text-align: left;">История</button>
    <button style="background: #1a1a1a; color: #fff; border: none; border-radius: 20px; padding: 10px 16px; font-size: 14px; cursor: pointer; text-align: left;">Новый чат</button>
    
    <div style="margin-top: 16px; font-size: 12px; color: var(--color-text-secondary); padding-left: 4px;">Создать</div>
    
    <button style="background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); color: var(--color-text-primary); border: none; border-radius: 20px; padding: 10px 16px; font-size: 14px; cursor: pointer; text-align: left;">Тест</button>
    <button onclick="sendPrompt('Покажи роадмап')" style="background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); color: var(--color-text-primary); border: none; border-radius: 20px; padding: 10px 16px; font-size: 14px; cursor: pointer; text-align: left;">Роадмап</button>
    <button style="background: rgba(245, 166, 35, 0.3); color: var(--color-text-primary); border: none; border-radius: 20px; padding: 10px 16px; font-size: 14px; cursor: pointer; text-align: left;">Карточки</button>
  </div>

  <!-- Main content -->
  <div style="flex: 1; padding: 20px; z-index: 10; display: flex; flex-direction: column;">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h1 style="font-size: 24px; font-weight: 500; margin: 0; color: var(--color-text-primary);">Карточки</h1>
      <button onclick="sendPrompt('Вернись в чат')" style="background: #1a1a1a; color: #fff; border: none; border-radius: 20px; padding: 10px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
        Вернуться в чат
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Mode toggle -->
    <div style="display: flex; gap: 8px; margin-bottom: 20px;">
      <button id="btn-review" onclick="setMode('review')" style="background: #1a1a1a; color: #fff; border: none; border-radius: 16px; padding: 8px 16px; font-size: 13px; cursor: pointer;">Обзор</button>
      <button id="btn-practice" onclick="setMode('practice')" style="background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); color: var(--color-text-primary); border: none; border-radius: 16px; padding: 8px 16px; font-size: 13px; cursor: pointer;">Повторение</button>
    </div>

    <!-- Card container -->
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <!-- Flashcard -->
      <div id="flashcard" onclick="flipCard()" style="width: 420px; height: 280px; background: linear-gradient(145deg, rgba(120, 110, 100, 0.9), rgba(100, 90, 80, 0.95)); border-radius: 24px; padding: 28px; cursor: pointer; position: relative; display: flex; flex-direction: column;">
        <div id="card-header" style="color: rgba(255,255,255,0.9); font-size: 18px; font-weight: 500; margin-bottom: 24px;">Вопрос 1/60</div>
        <div id="card-content" style="flex: 1; color: rgba(255,255,255,0.85); font-size: 16px; line-height: 1.5;">Сформулируйте теорему сложения для двух событий</div>
        
        <!-- Crow -->
        <div style="position: absolute; bottom: 20px; right: 24px;">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <ellipse cx="28" cy="26" rx="12" ry="16" fill="#1a1a1a"/>
            <ellipse cx="20" cy="30" rx="8" ry="10" fill="#1a1a1a"/>
            <circle cx="32" cy="20" r="3" fill="#1a1a1a"/>
            <circle cx="33" cy="19" r="1.2" fill="rgba(255,255,255,0.9)"/>
            <path d="M36 22l8-2-6 4z" fill="#1a1a1a"/>
            <path d="M18 40l-2 6M24 42l0 6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div style="font-size: 12px; color: var(--color-text-secondary); margin-top: 12px;">Нажмите на карточку, чтобы увидеть ответ</div>

      <!-- Review mode controls -->
      <div id="review-controls" style="display: flex; gap: 16px; margin-top: 24px;">
        <button onclick="prevCard()" style="width: 52px; height: 52px; background: #1a1a1a; color: #fff; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <button onclick="nextCard()" style="width: 52px; height: 52px; background: #1a1a1a; color: #fff; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Practice mode controls (hidden by default) -->
      <div id="practice-controls" style="display: none; flex-direction: column; align-items: center; gap: 12px; margin-top: 24px;">
        <div style="font-size: 12px; color: var(--color-text-secondary);">Насколько хорошо вы знали ответ?</div>
        <div style="display: flex; gap: 10px;">
          <button onclick="rateCard(0)" style="background: #e74c3c; color: #fff; border: none; border-radius: 12px; padding: 12px 16px; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="font-weight: 500;">Снова</span>
            <span style="opacity: 0.8; font-size: 10px;">&lt; 1 мин</span>
          </button>
          <button onclick="rateCard(1)" style="background: #e67e22; color: #fff; border: none; border-radius: 12px; padding: 12px 16px; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="font-weight: 500;">Трудно</span>
            <span style="opacity: 0.8; font-size: 10px;">10 мин</span>
          </button>
          <button onclick="rateCard(2)" style="background: #27ae60; color: #fff; border: none; border-radius: 12px; padding: 12px 16px; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="font-weight: 500;">Хорошо</span>
            <span style="opacity: 0.8; font-size: 10px;">1 день</span>
          </button>
          <button onclick="rateCard(3)" style="background: #2980b9; color: #fff; border: none; border-radius: 12px; padding: 12px 16px; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="font-weight: 500;">Легко</span>
            <span style="opacity: 0.8; font-size: 10px;">4 дня</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const cards = [
  { q: "Сформулируйте теорему сложения для двух событий", a: "P(A ∪ B) = P(A) + P(B) − P(A ∩ B)\n\nДля несовместных событий:\nP(A ∪ B) = P(A) + P(B)" },
  { q: "Сформулируйте теорему умножения для двух событий", a: "P(A ∩ B) = P(B) × P(A | B)\nили P(A) × P(B | A)\n\nДля независимых событий:\nP(A ∩ B) = P(A) × P(B)" },
  { q: "Что такое условная вероятность?", a: "P(A | B) = P(A ∩ B) / P(B)\n\nВероятность события A при условии, что событие B уже произошло" }
];

let currentCard = 0;
let isFlipped = false;
let mode = 'review';

function updateCard() {
  const card = cards[currentCard];
  document.getElementById('card-header').textContent = isFlipped ? 'Ответ' : `Вопрос ${currentCard + 1}/${cards.length}`;
  document.getElementById('card-content').style.whiteSpace = 'pre-line';
  document.getElementById('card-content').textContent = isFlipped ? card.a : card.q;
  document.getElementById('flashcard').style.background = isFlipped 
    ? 'linear-gradient(145deg, rgba(200, 170, 140, 0.95), rgba(180, 150, 120, 0.9))'
    : 'linear-gradient(145deg, rgba(120, 110, 100, 0.9), rgba(100, 90, 80, 0.95))';
  document.getElementById('card-content').style.color = isFlipped ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.85)';
  document.getElementById('card-header').style.color = isFlipped ? 'rgba(0,0,0,0.9)' : 'rgba(255,255,255,0.9)';
}

function flipCard() {
  isFlipped = !isFlipped;
  updateCard();
}

function nextCard() {
  currentCard = (currentCard + 1) % cards.length;
  isFlipped = false;
  updateCard();
}

function prevCard() {
  currentCard = (currentCard - 1 + cards.length) % cards.length;
  isFlipped = false;
  updateCard();
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-review').style.background = m === 'review' ? '#1a1a1a' : 'rgba(255,255,255,0.5)';
  document.getElementById('btn-review').style.color = m === 'review' ? '#fff' : 'var(--color-text-primary)';
  document.getElementById('btn-practice').style.background = m === 'practice' ? '#1a1a1a' : 'rgba(255,255,255,0.5)';
  document.getElementById('btn-practice').style.color = m === 'practice' ? '#fff' : 'var(--color-text-primary)';
  document.getElementById('review-controls').style.display = m === 'review' ? 'flex' : 'none';
  document.getElementById('practice-controls').style.display = m === 'practice' ? 'flex' : 'none';
}

function rateCard(rating) {
  nextCard();
}
</script>
