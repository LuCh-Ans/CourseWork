<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study AI</title>
    <style>
        :root {
            --font-sans: system-ui, -apple-system, sans-serif;
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #666;
            --color-background-secondary: #f0f0f0;
        }
        body {
            margin: 0;
            font-family: var(--font-sans);
        }
    </style>
</head>
<body>

<div style="font-family: var(--font-sans); min-height: 650px; background: linear-gradient(145deg, #e8e6e1 0%, #d9d5ce 100%); border-radius: 24px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;">

    <!-- Header -->
    <div style="position: absolute; top: 24px; left: 24px; right: 24px; display: flex; justify-content: space-between; align-items: center; z-index: 10;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <svg width="32" height="32" viewBox="0 0 48 48">
          <ellipse cx="28" cy="26" rx="12" ry="16" fill="#1a1a1a"/>
          <ellipse cx="20" cy="30" rx="8" ry="10" fill="#1a1a1a"/>
          <circle cx="32" cy="20" r="3" fill="#1a1a1a"/>
          <circle cx="33" cy="19" r="1.2" fill="#e8e6e1"/>
          <path d="M36 22l8-2-6 4z" fill="#1a1a1a"/>
        </svg>
        <span style="font-size: 18px; font-weight: 500; color: var(--color-text-primary);">Study AI</span>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
          </div>
          <span style="font-size: 14px; color: var(--color-text-primary);">Пользователь</span>
        </div>
        <button onclick="window.location.href='/login'" style="background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.7); border-radius: 20px; padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--color-text-primary);">созданные проекты</button>
      </div>
    </div>

    <!-- Orange hemisphere -->
    <div style="width: 280px; height: 140px; background: linear-gradient(180deg, #F5A623 0%, #E8882D 100%); border-radius: 140px 140px 0 0; margin-bottom: -20px; z-index: 1;"></div>

    <!-- Main text -->
    <div style="text-align: center; z-index: 2; margin-bottom: 8px;">
      <h1 style="font-size: 32px; font-weight: 500; margin: 0; color: var(--color-text-primary);">Загрузи материал — получи</h1>
      <h1 style="font-size: 32px; font-weight: 500; margin: 0; color: #E8882D;">умный конспект</h1>
    </div>

    <!-- Upload zone -->
    <div style="background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(16px); border-radius: 32px; padding: 48px 64px; width: 420px; border: 1px solid rgba(255,255,255,0.6); z-index: 10; text-align: center; margin-top: 16px;">
      <input type="file" id="fileInput" accept=".pdf,.txt,.docx" style="display: none;" onchange="uploadFile()">
      <div onclick="document.getElementById('fileInput').click()" style="border: 2px dashed rgba(0,0,0,0.15); border-radius: 20px; padding: 40px 24px; cursor: pointer;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5" style="margin-bottom: 12px;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <p style="margin: 0; font-size: 15px; color: var(--color-text-primary);"><strong>перетащи файл</strong> <span style="color: var(--color-text-secondary);">сюда или выбери вручную</span></p>
      </div>
      <div id="result" style="margin-top: 20px; text-align: left;"></div>
    </div>

    <!-- Bottom gradient blob -->
    <div style="position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); width: 500px; height: 200px; background: linear-gradient(180deg, rgba(245, 166, 35, 0.3) 0%, rgba(232, 136, 45, 0.1) 100%); border-radius: 50%; filter: blur(40px);"></div>
  </div>

<script>
async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];

    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<p>⏳ Обрабатываем файл...</p>';

    try {
        const response = await fetch('/upload', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            resultDiv.innerHTML = `
                <h3>✅ Файл обработан!</h3>
                <p><strong>Имя файла:</strong> ${data.original_filename}</p>
                <p><strong>Символов извлечено:</strong> ${data.characters_extracted}</p>
                <h4>Краткое содержание:</h4>
                <p>${data.summary}</p>
                <button onclick="window.location.href='/chat'" style="background: #1a1a1a; color: #fff; border: none; border-radius: 20px; padding: 10px 20px; cursor: pointer; margin-top: 10px;">
                    Перейти в чат →
                </button>
            `;
        } else {
            resultDiv.innerHTML = `<p style="color: red;">❌ Ошибка: ${data.detail}</p>`;
        }
    } catch (error) {
        resultDiv.innerHTML = `<p style="color: red;">❌ ${error.message}</p>`;
    }
}
</script>
</body>
</html>
